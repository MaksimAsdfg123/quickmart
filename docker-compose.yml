services:
  postgres:
    image: postgres:16-alpine
    container_name: quickmart-postgres
    profiles: ["core"]
    environment:
      POSTGRES_DB: quickmart
      POSTGRES_USER: quickmart
      POSTGRES_PASSWORD: quickmart
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickmart -d quickmart"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: quickmart-backend
    profiles: ["core"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/quickmart
      DB_USERNAME: quickmart
      DB_PASSWORD: quickmart
      APP_KAFKA_ENABLED: "${APP_KAFKA_ENABLED:-false}"
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:19092}"
      APP_MOCK_ONLINE_PAYMENT_ENABLED: "${APP_MOCK_ONLINE_PAYMENT_ENABLED:-false}"
      APP_MOCK_ONLINE_PAYMENT_BASE_URL: "${APP_MOCK_ONLINE_PAYMENT_BASE_URL:-http://wiremock:8080}"
      APP_MOCK_ONLINE_PAYMENT_API_KEY: "${APP_MOCK_ONLINE_PAYMENT_API_KEY:-quickmart-local-sandbox-key}"
      JWT_SECRET: very-secret-jwt-key-change-me-in-production-please
      JWT_EXPIRATION_SECONDS: 86400
      SERVER_PORT: 8080
      SPRING_MAIN_LAZY_INITIALIZATION: "true"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./app/frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: quickmart-frontend
    profiles: ["core"]
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 | grep -q '<!doctype html>'"]
      interval: 10s
      timeout: 5s
      retries: 6

  kafka:
    image: apache/kafka:4.1.1
    hostname: kafka
    container_name: quickmart-kafka
    profiles: ["infra"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    ports:
      - "${KAFKA_PORT:-9092}:9092"

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: quickmart-kafka-ui
    profiles: ["infra"]
    depends_on:
      - kafka
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: quickmart-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
    ports:
      - "${KAFKA_UI_PORT:-8090}:8080"

  redis:
    image: redis:7-alpine
    container_name: quickmart-redis
    profiles: ["infra"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  wiremock:
    image: wiremock/wiremock:3.9.1
    container_name: quickmart-wiremock
    profiles: ["infra"]
    ports:
      - "${WIREMOCK_PORT:-8089}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/__admin/mappings >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
