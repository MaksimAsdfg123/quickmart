services:
  postgres:
    image: postgres:16-alpine
    container_name: quickmart-postgres
    profiles: ["core"]
    environment:
      POSTGRES_DB: quickmart
      POSTGRES_USER: quickmart
      POSTGRES_PASSWORD: quickmart
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickmart -d quickmart"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: quickmart-backend
    profiles: ["core"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/quickmart
      DB_USERNAME: quickmart
      DB_PASSWORD: quickmart
      JWT_SECRET: very-secret-jwt-key-change-me-in-production-please
      JWT_EXPIRATION_SECONDS: 86400
      SERVER_PORT: 8080
      SPRING_MAIN_LAZY_INITIALIZATION: "true"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./app/frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: quickmart-frontend
    profiles: ["core"]
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 | grep -q '<!doctype html>'"]
      interval: 10s
      timeout: 5s
      retries: 6

  kafka:
    image: bitnami/kafka:3.7
    container_name: quickmart-kafka
    profiles: ["infra"]
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "${KAFKA_PORT:-9092}:9092"

  redis:
    image: redis:7-alpine
    container_name: quickmart-redis
    profiles: ["infra"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  wiremock:
    image: wiremock/wiremock:3.9.1
    container_name: quickmart-wiremock
    profiles: ["infra"]
    ports:
      - "${WIREMOCK_PORT:-8089}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/__admin/mappings >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
