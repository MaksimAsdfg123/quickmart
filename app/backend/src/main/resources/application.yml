spring:
  application:
    name: quickmart-backend
  main:
    lazy-initialization: ${SPRING_MAIN_LAZY_INITIALIZATION:true}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/quickmart}
    username: ${DB_USERNAME:quickmart}
    password: ${DB_PASSWORD:quickmart}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
  jackson:
    time-zone: UTC
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    listener:
      missing-topics-fatal: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:very-secret-jwt-key-change-me-in-production-please}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  cache:
    enabled: ${APP_CACHE_ENABLED:true}
    public-catalog-pages:
      ttl: ${APP_CACHE_PUBLIC_CATALOG_TTL:30s}
      maximum-size: ${APP_CACHE_PUBLIC_CATALOG_MAX_SIZE:256}
    public-product-cards:
      ttl: ${APP_CACHE_PUBLIC_PRODUCT_TTL:30s}
      maximum-size: ${APP_CACHE_PUBLIC_PRODUCT_MAX_SIZE:1024}
    public-categories:
      ttl: ${APP_CACHE_PUBLIC_CATEGORIES_TTL:30m}
      maximum-size: ${APP_CACHE_PUBLIC_CATEGORIES_MAX_SIZE:64}
  integrations:
    mock-online-payment:
      enabled: ${APP_MOCK_ONLINE_PAYMENT_ENABLED:false}
      base-url: ${APP_MOCK_ONLINE_PAYMENT_BASE_URL:http://localhost:8089}
      api-key: ${APP_MOCK_ONLINE_PAYMENT_API_KEY:quickmart-local-sandbox-key}
      connect-timeout: ${APP_MOCK_ONLINE_PAYMENT_CONNECT_TIMEOUT:500ms}
      read-timeout: ${APP_MOCK_ONLINE_PAYMENT_READ_TIMEOUT:2s}
  kafka:
    enabled: ${APP_KAFKA_ENABLED:false}
    topic: ${APP_KAFKA_TOPIC:quickmart.order-events}
    consumer-group: ${APP_KAFKA_CONSUMER_GROUP:quickmart-order-audit}

logging:
  level:
    org.springframework.security: INFO
