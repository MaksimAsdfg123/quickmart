name: nightly-integration

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-integration
  cancel-in-progress: true

env:
  CI: "true"
  API_BASE_URL: ${{ vars.API_BASE_URL || 'http://127.0.0.1:8080' }}
  UI_BASE_URL: ${{ vars.UI_BASE_URL || 'http://127.0.0.1:5173' }}
  AUTH_ADMIN_EMAIL: ${{ vars.AUTH_ADMIN_EMAIL || 'admin@quickmart.local' }}
  AUTH_ADMIN_PASSWORD: ${{ secrets.AUTH_ADMIN_PASSWORD || 'password' }}
  AUTH_CUSTOMER_EMAIL: ${{ vars.AUTH_CUSTOMER_EMAIL || 'anna@example.com' }}
  AUTH_CUSTOMER_PASSWORD: ${{ secrets.AUTH_CUSTOMER_PASSWORD || 'password' }}
  E2E_ADMIN_EMAIL: ${{ vars.E2E_ADMIN_EMAIL || 'admin@quickmart.local' }}
  E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || 'password' }}
  E2E_CUSTOMER_EMAIL: ${{ vars.E2E_CUSTOMER_EMAIL || 'anna@example.com' }}
  E2E_CUSTOMER_PASSWORD: ${{ secrets.E2E_CUSTOMER_PASSWORD || 'password' }}
  UI_HEADLESS: "true"

jobs:
  integration-full:
    name: nightly / integration-full
    runs-on:
      - self-hosted
      - heavy-linux
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Start core + infra stack
        run: docker compose --profile core --profile infra up -d --build --wait

      - name: Run full API and UI suites
        run: ./gradlew :api-tests:apiTest :ui-tests:uiTest --no-daemon

      - name: Observability diagnostics check
        if: always()
        run: |
          set -e
          test -d tests/backend/build/allure-results
          test -d tests/frontend/build/allure-results
          test -d tests/frontend/artifacts/traces
          ls tests/frontend/artifacts/traces/*.zip >/dev/null 2>&1
          grep -R "HTTP Request:" tests/backend/build/test-results >/dev/null 2>&1
          {
            echo "### Observability check"
            echo "- Allure results found for API and UI."
            echo "- Playwright traces found."
            echo "- API HTTP trace logs found in JUnit XML."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect docker logs
        if: always()
        run: |
          mkdir -p ci-logs
          docker compose --profile core --profile infra logs --no-color > ci-logs/nightly-integration-docker.log || true

      - name: Upload nightly integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-integration-artifacts
          if-no-files-found: warn
          path: |
            tests/backend/build/test-results/**
            tests/backend/build/reports/tests/**
            tests/backend/build/allure-results/**
            tests/frontend/build/test-results/**
            tests/frontend/build/reports/tests/**
            tests/frontend/build/allure-results/**
            tests/frontend/artifacts/**
            ci-logs/nightly-integration-docker.log

      - name: Add failure summary
        if: failure()
        run: |
          {
            echo "### Nightly integration failed"
            echo "- Full stack: core + infra"
            echo "- Check artifact \`nightly-integration-artifacts\` for logs and reports."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop stack
        if: always()
        run: docker compose --profile core --profile infra down -v --remove-orphans
