name: pr-ci

on:
  pull_request:

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  API_BASE_URL: ${{ vars.API_BASE_URL || 'http://127.0.0.1:8080' }}
  UI_BASE_URL: ${{ vars.UI_BASE_URL || 'http://127.0.0.1:5173' }}
  AUTH_ADMIN_EMAIL: ${{ vars.AUTH_ADMIN_EMAIL || 'admin@quickmart.local' }}
  AUTH_ADMIN_PASSWORD: ${{ secrets.AUTH_ADMIN_PASSWORD || 'password' }}
  AUTH_CUSTOMER_EMAIL: ${{ vars.AUTH_CUSTOMER_EMAIL || 'anna@example.com' }}
  AUTH_CUSTOMER_PASSWORD: ${{ secrets.AUTH_CUSTOMER_PASSWORD || 'password' }}
  E2E_ADMIN_EMAIL: ${{ vars.E2E_ADMIN_EMAIL || 'admin@quickmart.local' }}
  E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || 'password' }}
  E2E_CUSTOMER_EMAIL: ${{ vars.E2E_CUSTOMER_EMAIL || 'anna@example.com' }}
  E2E_CUSTOMER_PASSWORD: ${{ secrets.E2E_CUSTOMER_PASSWORD || 'password' }}
  UI_HEADLESS: "true"

jobs:
  backend-unit:
    name: pr / backend-unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run backend unit tests
        run: ./gradlew :backend:test --no-daemon

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-reports
          if-no-files-found: warn
          path: |
            app/backend/build/test-results/**
            app/backend/build/reports/tests/**

  frontend-build:
    name: pr / frontend-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        working-directory: app/frontend
        run: npm run build

      - name: Upload frontend build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          if-no-files-found: warn
          path: app/frontend/dist/**

  api-smoke:
    name: pr / api-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Start core stack for API smoke
        run: docker compose --profile core up -d --build --wait postgres backend

      - name: Run API smoke tests
        run: ./gradlew :api-tests:apiSmokeTest --no-daemon

      - name: Collect docker logs
        if: always()
        run: |
          mkdir -p ci-logs
          docker compose --profile core logs --no-color > ci-logs/api-smoke-docker.log || true

      - name: Upload API smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-smoke-artifacts
          if-no-files-found: warn
          path: |
            tests/backend/build/test-results/**
            tests/backend/build/reports/tests/**
            tests/backend/build/allure-results/**
            ci-logs/api-smoke-docker.log

      - name: Add failure summary
        if: failure()
        run: |
          {
            echo "### API smoke failed"
            echo "- Container logs: artifact \`api-smoke-artifacts\`"
            echo "- Test reports: \`tests/backend/build/reports/tests\`"
            echo "- Allure results: \`tests/backend/build/allure-results\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop core stack
        if: always()
        run: docker compose --profile core down -v --remove-orphans

  ui-smoke:
    name: pr / ui-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Start core stack for UI smoke
        run: docker compose --profile core up -d --build --wait postgres backend frontend

      - name: Install Playwright browsers
        run: ./gradlew :ui-tests:installUiBrowsers --no-daemon

      - name: Run UI smoke tests
        run: ./gradlew :ui-tests:uiSmokeTest --no-daemon

      - name: Collect docker logs
        if: always()
        run: |
          mkdir -p ci-logs
          docker compose --profile core logs --no-color > ci-logs/ui-smoke-docker.log || true

      - name: Upload UI smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-artifacts
          if-no-files-found: warn
          path: |
            tests/frontend/build/test-results/**
            tests/frontend/build/reports/tests/**
            tests/frontend/build/allure-results/**
            tests/frontend/artifacts/**
            ci-logs/ui-smoke-docker.log

      - name: Add failure summary
        if: failure()
        run: |
          {
            echo "### UI smoke failed"
            echo "- Container logs: artifact \`ui-smoke-artifacts\`"
            echo "- Playwright artifacts: \`tests/frontend/artifacts\`"
            echo "- Test reports: \`tests/frontend/build/reports/tests\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop core stack
        if: always()
        run: docker compose --profile core down -v --remove-orphans
