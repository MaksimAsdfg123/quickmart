name: nightly-performance

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-performance
  cancel-in-progress: true

env:
  CI: "true"
  API_BASE_URL: ${{ vars.API_BASE_URL || 'http://127.0.0.1:8080' }}
  K6_VUS: "20"
  K6_DURATION: "2m"

jobs:
  performance:
    name: nightly / performance
    runs-on:
      - self-hosted
      - heavy-linux
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start core stack for load tests
        run: docker compose --profile core up -d --build --wait postgres backend

      - name: Run k6 load test
        run: |
          mkdir -p tests/performance/results
          docker run --rm --network host \
            -e API_BASE_URL="${API_BASE_URL}" \
            -e K6_VUS="${K6_VUS}" \
            -e K6_DURATION="${K6_DURATION}" \
            -v "${PWD}/tests/performance:/work" \
            grafana/k6:0.53.0 run /work/smoke-load.js --summary-export=/work/results/summary.json

      - name: Build markdown performance summary
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("tests/performance/results/summary.json")
          if not path.exists():
            print("No summary file found")
            raise SystemExit(1)

          data = json.loads(path.read_text(encoding="utf-8"))
          metrics = data.get("metrics", {})

          def metric(name, key="value", default="n/a"):
            return metrics.get(name, {}).get(key, default)

          lines = [
            "### Nightly performance summary",
            f"- http_req_duration p(95): `{metric('http_req_duration', 'p(95)')}` ms",
            f"- http_req_failed rate: `{metric('http_req_failed', 'rate')}`",
            f"- checks pass rate: `{metric('checks', 'rate')}`",
            f"- iterations: `{metric('iterations', 'count')}`",
            "",
            "Raw JSON: `tests/performance/results/summary.json`",
          ]
          with open(Path(__import__('os').environ["GITHUB_STEP_SUMMARY"]), "a", encoding="utf-8") as fh:
            fh.write("\n".join(lines) + "\n")
          PY

      - name: Collect docker logs
        if: always()
        run: |
          mkdir -p ci-logs
          docker compose --profile core logs --no-color > ci-logs/nightly-performance-docker.log || true

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-performance-artifacts
          if-no-files-found: warn
          path: |
            tests/performance/results/**
            ci-logs/nightly-performance-docker.log

      - name: Stop stack
        if: always()
        run: docker compose --profile core down -v --remove-orphans
