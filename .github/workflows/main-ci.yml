name: main-ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  API_BASE_URL: ${{ vars.API_BASE_URL || 'http://127.0.0.1:8080' }}
  UI_BASE_URL: ${{ vars.UI_BASE_URL || 'http://127.0.0.1:5173' }}
  AUTH_ADMIN_EMAIL: ${{ vars.AUTH_ADMIN_EMAIL || 'admin@quickmart.local' }}
  AUTH_ADMIN_PASSWORD: ${{ secrets.AUTH_ADMIN_PASSWORD || 'password' }}
  AUTH_CUSTOMER_EMAIL: ${{ vars.AUTH_CUSTOMER_EMAIL || 'anna@example.com' }}
  AUTH_CUSTOMER_PASSWORD: ${{ secrets.AUTH_CUSTOMER_PASSWORD || 'password' }}
  E2E_ADMIN_EMAIL: ${{ vars.E2E_ADMIN_EMAIL || 'admin@quickmart.local' }}
  E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || 'password' }}
  E2E_CUSTOMER_EMAIL: ${{ vars.E2E_CUSTOMER_EMAIL || 'anna@example.com' }}
  E2E_CUSTOMER_PASSWORD: ${{ secrets.E2E_CUSTOMER_PASSWORD || 'password' }}
  UI_HEADLESS: "true"

jobs:
  api-full:
    name: api-full
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Start core stack for API full run
        run: docker compose --profile core up -d --build --wait postgres backend

      - name: Run full API suite
        run: ./gradlew :api-tests:apiTest --no-daemon

      - name: Collect docker logs
        if: always()
        run: |
          mkdir -p ci-logs
          docker compose --profile core logs --no-color > ci-logs/api-full-docker.log || true

      - name: Upload API artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-full-artifacts
          if-no-files-found: warn
          path: |
            tests/backend/build/test-results/**
            tests/backend/build/reports/tests/**
            tests/backend/build/allure-results/**
            ci-logs/api-full-docker.log

      - name: Add failure summary
        if: failure()
        run: |
          {
            echo "### api-full failed"
            echo "- Container logs: artifact \`api-full-artifacts\`"
            echo "- Reports: \`tests/backend/build/reports/tests\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop core stack
        if: always()
        run: docker compose --profile core down -v --remove-orphans

  ui-full:
    name: ui-full
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Start core stack for UI full run
        run: docker compose --profile core up -d --build --wait postgres backend frontend

      - name: Install Playwright browsers
        run: ./gradlew :ui-tests:installUiBrowsers --no-daemon

      - name: Run full UI suite
        run: ./gradlew :ui-tests:uiTest --no-daemon

      - name: Collect docker logs
        if: always()
        run: |
          mkdir -p ci-logs
          docker compose --profile core logs --no-color > ci-logs/ui-full-docker.log || true

      - name: Upload UI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-full-artifacts
          if-no-files-found: warn
          path: |
            tests/frontend/build/test-results/**
            tests/frontend/build/reports/tests/**
            tests/frontend/build/allure-results/**
            tests/frontend/artifacts/**
            ci-logs/ui-full-docker.log

      - name: Add failure summary
        if: failure()
        run: |
          {
            echo "### ui-full failed"
            echo "- Container logs: artifact \`ui-full-artifacts\`"
            echo "- Playwright traces/videos: \`tests/frontend/artifacts\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop core stack
        if: always()
        run: docker compose --profile core down -v --remove-orphans
