spring:
  main:
    lazy-initialization: false
  datasource:
    url: jdbc:h2:mem:quickmart-${random.uuid};MODE=PostgreSQL;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      auto-offset-reset: earliest

app:
  cache:
    enabled: true
  integrations:
    mock-online-payment:
      enabled: false
      base-url: http://localhost:8089
      api-key: quickmart-test-sandbox-key
      connect-timeout: 300ms
      read-timeout: 300ms
  kafka:
    enabled: true

